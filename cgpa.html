<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CGPA Calculator</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">

<h2>CGPA Calculator</h2>

<a href="dashboard.html">
<button>Dashboard</button>
</a>

</nav>

<div class="container">

<div class="card">

<h2>Enter Semester SGPAs</h2>

<input type="number" step="0.01" id="sem1" placeholder="Semester 1 SGPA">
<input type="number" step="0.01" id="sem2" placeholder="Semester 2 SGPA">
<input type="number" step="0.01" id="sem3" placeholder="Semester 3 SGPA">
<input type="number" step="0.01" id="sem4" placeholder="Semester 4 SGPA">
<input type="number" step="0.01" id="sem5" placeholder="Semester 5 SGPA">
<input type="number" step="0.01" id="sem6" placeholder="Semester 6 SGPA">
<input type="number" step="0.01" id="sem7" placeholder="Semester 7 SGPA">
<input type="number" step="0.01" id="sem8" placeholder="Semester 8 SGPA">
<button onclick="calculateCGPA()">
Calculate CGPA
</button>

<h2 id="cgpaResult">
CGPA: 0.00
</h2>

</div>

</div>

<script src="js/script.js"></script>

</body>

</html>
